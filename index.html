<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Green flag / Red flag</title>
  <style>
    :root{
      --green:#17d46b;
      --red:#ff3b3b;
      --text:#0b0b10;
    }

    html, body{
      height:100%;
      margin:0;
    }

    body{
      font-family: -apple-system, system-ui, Segoe UI, Roboto, Arial, sans-serif;
      display:flex;
      align-items:center;
      justify-content:center;
      transition: background .2s ease;
      background: var(--green); /* défaut */
      color: var(--text);
      padding: max(16px, env(safe-area-inset-top)) max(16px, env(safe-area-inset-right))
               max(16px, env(safe-area-inset-bottom)) max(16px, env(safe-area-inset-left));
    }

    .box{
      text-align:center;
      width:min(520px, 92vw);
    }

    .emoji{
      font-size: clamp(72px, 12vw, 120px);
      line-height:1;
      margin: 0 0 14px;
      filter: drop-shadow(0 14px 26px rgba(0,0,0,.22));
    }

    h1{
      margin:0 0 10px;
      font-size: clamp(22px, 4.5vw, 34px);
      letter-spacing: -.3px;
    }

    .sub{
      margin:0 0 18px;
      font-size: clamp(14px, 2.8vw, 16px);
      opacity:.85;
      line-height:1.4;
    }

    .btnRow{
      display:flex;
      gap:12px;
      justify-content:center;
      flex-wrap:wrap;
      margin-top: 10px;
    }

    button{
      border:0;
      cursor:pointer;
      border-radius:14px;
      padding: 14px 16px;
      font-weight:800;
      font-size: 14px;
      min-width: 160px;
      box-shadow: 0 16px 34px rgba(0,0,0,.18);
    }

    .btnGreen{ background: rgba(255,255,255,.92); }
    .btnRed{ background: rgba(255,255,255,.92); }

    /* petit badge en haut */
    .top{
      position: fixed;
      top: 14px;
      left: 14px;
      right: 14px;
      display:flex;
      justify-content:space-between;
      gap:10px;
      pointer-events:none;
      font-weight:700;
      opacity:.9;
    }
    .pill{
      pointer-events:none;
      background: rgba(255,255,255,.28);
      border: 1px solid rgba(255,255,255,.35);
      padding: 8px 10px;
      border-radius: 999px;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }
  </style>
</head>

<body>
  <div class="top">
    <div class="pill" id="clock">--:--</div>
    <div class="pill" id="status">Green flag -- d’accord</div>
  </div>

  <div class="box">
    <div class="emoji" id="emoji">🟢</div>
    <h1 id="title">Green flag</h1>
    <p class="sub" id="msg">Je suis d’accord. On peut avancer.</p>

    <div class="btnRow">
      <button class="btnGreen" type="button" onclick="setGreen()">🟢 D’accord</button>
      <button class="btnRed" type="button" onclick="setRed()">🔴 Pas d’accord</button>
    </div>
  </div>

  <script>
    function setGreen(){
      document.body.style.background = getComputedStyle(document.documentElement).getPropertyValue('--green');
      document.getElementById('emoji').textContent = '🟢';
      document.getElementById('title').textContent = 'Green flag';
      document.getElementById('msg').textContent = "Je suis d’accord. AVANCE!";
      document.getElementById('status').textContent = "Green flag -- d’accord";
    }

    function setRed(){
      document.body.style.background = getComputedStyle(document.documentElement).getPropertyValue('--red');
      document.getElementById('emoji').textContent = '🔴';
      document.getElementById('title').textContent = 'Red flag';
      document.getElementById('msg').textContent = "Je ne suis pas d’accord.";
      document.getElementById('status').textContent = "Red flag -- pas d’accord";
    }

    function tick(){
      const d = new Date();
      const hh = String(d.getHours()).padStart(2,'0');
      const mm = String(d.getMinutes()).padStart(2,'0');
      document.getElementById('clock').textContent = `${hh}:${mm}`;
    }
    setInterval(tick, 1000); tick();
  </script>
</body>
</html>
